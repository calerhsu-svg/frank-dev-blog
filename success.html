<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Success — Frank Dev</title>
<link rel="stylesheet" href="css/style.css">
<style>
.success-container{max-width:520px;margin:80px auto;padding:40px 32px;text-align:center}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:800;color:var(--primary);margin-bottom:12px}
.success-sub{font-size:14px;color:var(--sub);margin-bottom:32px}
.success-spinner{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:24px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.success-error{color:#E03131;font-size:14px;margin:16px 0}
.btn-download{display:inline-block;padding:14px 32px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:16px}
.btn-download:hover{opacity:0.9}
.fallback-link{display:block;margin-top:16px;font-size:13px;color:var(--sub)}
.fallback-link a{color:var(--primary)}
</style>
</head>
<body>
<div class="success-container" id="success-page">
  <div id="state-loading">
    <div class="success-icon">💳</div>
    <div class="success-title" id="loading-title">驗證付款中...</div>
    <div class="success-spinner"></div>
    <div class="success-sub" id="loading-sub">請稍候，正在確認您的付款</div>
  </div>
  <div id="state-success" style="display:none">
    <div class="success-icon">✅</div>
    <div class="success-title" id="success-title">付款成功！</div>
    <div class="success-sub" id="success-sub">感謝您的購買，請點擊下方按鈕下載課程</div>
    <a class="btn-download" id="download-btn" href="#">📥 下載課程</a>
  </div>
  <div id="state-error" style="display:none">
    <div class="success-icon">❌</div>
    <div class="success-title" id="error-title">驗證失敗</div>
    <div class="success-sub" id="error-sub">付款驗證失敗，請聯繫客服</div>
    <div class="fallback-link">
      <a href="mailto:a8398433@gmail.com?subject=[Frank Dev] Payment Issue">✉️ <span id="contact-text">聯繫客服</span></a>
    </div>
  </div>
</div>

<script>
const TEXTS = {
  tw: {
    loading_title: '驗證付款中...',
    loading_sub: '請稍候，正在確認您的付款',
    success_title: '付款成功！',
    success_sub: '感謝您的購買，請點擊下方按鈕下載課程',
    download_btn: '📥 下載課程',
    error_title: '驗證失敗',
    error_sub: '付款驗證失敗，請聯繫客服',
    contact: '聯繫客服'
  },
  jp: {
    loading_title: 'お支払い確認中...',
    loading_sub: 'しばらくお待ちください',
    success_title: 'お支払い完了！',
    success_sub: 'ご購入ありがとうございます。下のボタンからコースをダウンロードしてください',
    download_btn: '📥 コースをダウンロード',
    error_title: '確認失敗',
    error_sub: 'お支払いの確認に失敗しました。サポートまでお問い合わせください',
    contact: 'サポートに連絡'
  },
  cn: {
    loading_title: '验证付款中...',
    loading_sub: '请稍候，正在确认您的付款',
    success_title: '付款成功！',
    success_sub: '感谢您的购买，请点击下方按钮下载课程',
    download_btn: '📥 下载课程',
    error_title: '验证失败',
    error_sub: '付款验证失败，请联系客服',
    contact: '联系客服'
  },
  ph: {
    loading_title: 'Verifying payment...',
    loading_sub: 'Please wait while we confirm your payment',
    success_title: 'Payment Successful!',
    success_sub: 'Thank you for your purchase. Click below to download your course',
    download_btn: '📥 Download Course',
    error_title: 'Verification Failed',
    error_sub: 'Payment verification failed. Please contact support',
    contact: 'Contact Support'
  }
}

function getLang() {
  const saved = localStorage.getItem('frank-dev-lang')
  if (saved && ['tw','jp','cn','ph'].includes(saved)) return saved
  const nav = (navigator.language || '').toLowerCase()
  if (nav.startsWith('ja')) return 'jp'
  if (nav.startsWith('zh')) {
    if (nav.includes('tw') || nav.includes('hant')) return 'tw'
    return 'cn'
  }
  if (nav.startsWith('fil') || nav.startsWith('tl')) return 'ph'
  return 'tw'
}

function applyTexts(lang) {
  const t = TEXTS[lang] || TEXTS.tw
  document.getElementById('loading-title').textContent = t.loading_title
  document.getElementById('loading-sub').textContent = t.loading_sub
  document.getElementById('success-title').textContent = t.success_title
  document.getElementById('success-sub').textContent = t.success_sub
  document.getElementById('download-btn').textContent = t.download_btn
  document.getElementById('error-title').textContent = t.error_title
  document.getElementById('error-sub').textContent = t.error_sub
  document.getElementById('contact-text').textContent = t.contact
}

function showState(state) {
  document.getElementById('state-loading').style.display = state === 'loading' ? '' : 'none'
  document.getElementById('state-success').style.display = state === 'success' ? '' : 'none'
  document.getElementById('state-error').style.display = state === 'error' ? '' : 'none'
}

async function verifyPayment() {
  const params = new URLSearchParams(window.location.search)
  const sessionId = params.get('session_id')

  if (!sessionId) {
    showState('error')
    return
  }

  try {
    const resp = await fetch('/api/download?session_id=' + encodeURIComponent(sessionId))
    if (resp.ok) {
      const html = await resp.text()
      const blob = new Blob([html], { type: 'text/html' })
      const url = URL.createObjectURL(blob)
      document.getElementById('download-btn').href = url
      document.getElementById('download-btn').download = 'course.html'
      showState('success')
    } else {
      showState('error')
    }
  } catch {
    showState('error')
  }
}

const lang = getLang()
applyTexts(lang)
verifyPayment()
</script>
</body>
</html>
