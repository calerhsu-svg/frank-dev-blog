<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Success — Frank Dev</title>
<link rel="stylesheet" href="css/style.css">
<style>
.success-container{max-width:520px;margin:80px auto;padding:40px 32px;text-align:center}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:800;color:var(--primary);margin-bottom:12px}
.success-sub{font-size:14px;color:var(--sub);margin-bottom:24px;line-height:1.7}
.success-info{background:var(--tag-bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin:24px 0;text-align:left;font-size:13px;color:var(--text);line-height:1.8}
.success-info h4{font-size:14px;font-weight:700;margin-bottom:8px}
.success-steps{list-style:none;padding:0;margin:0}
.success-steps li{padding:4px 0}
.btn-home{display:inline-block;padding:14px 32px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:8px}
.btn-home:hover{opacity:0.9}
.contact-link{display:block;margin-top:16px;font-size:13px;color:var(--sub)}
.contact-link a{color:var(--primary)}
</style>
</head>
<body>
<div class="success-container">
  <div class="success-icon">✅</div>
  <div class="success-title" id="s-title">付款成功！</div>
  <div class="success-sub" id="s-sub">感謝您的購買！我們已收到您的付款。</div>
  <div class="success-info">
    <h4 id="s-next-title">📦 接下來...</h4>
    <ul class="success-steps">
      <li id="s-step1">1. 我們將在確認付款後，於 1 個工作天內將教材寄送至您的 Email</li>
      <li id="s-step2">2. 如未收到，請檢查垃圾郵件資料夾</li>
      <li id="s-step3">3. 如有任何問題，請聯繫我們</li>
    </ul>
  </div>
  <a class="btn-home" href="/" id="s-home-btn">🏠 返回首頁</a>
  <div class="contact-link">
    <a href="mailto:a8398433@gmail.com?subject=[Frank Dev] Course Purchase Question" id="s-contact">✉️ a8398433@gmail.com</a>
  </div>
</div>

<script>
const TEXTS = {
  tw: {
    title: '付款成功！',
    sub: '感謝您的購買！我們已收到您的付款。',
    next_title: '📦 接下來...',
    step1: '1. 我們將在確認付款後，於 1 個工作天內將教材寄送至您的 Email',
    step2: '2. 如未收到，請檢查垃圾郵件資料夾',
    step3: '3. 如有任何問題，請聯繫我們',
    home_btn: '🏠 返回首頁'
  },
  jp: {
    title: 'お支払い完了！',
    sub: 'ご購入ありがとうございます！お支払いを受け取りました。',
    next_title: '📦 次のステップ...',
    step1: '1. お支払い確認後、1営業日以内に教材をメールでお送りします',
    step2: '2. 届かない場合は迷惑メールフォルダをご確認ください',
    step3: '3. ご不明な点がございましたらお問い合わせください',
    home_btn: '🏠 トップページへ'
  },
  cn: {
    title: '付款成功！',
    sub: '感谢您的购买！我们已收到您的付款。',
    next_title: '📦 接下来...',
    step1: '1. 我们将在确认付款后，于 1 个工作天内将教材寄送至您的 Email',
    step2: '2. 如未收到，请检查垃圾邮件文件夹',
    step3: '3. 如有任何问题，请联系我们',
    home_btn: '🏠 返回首页'
  },
  ph: {
    title: 'Payment Successful!',
    sub: 'Thank you for your purchase! We have received your payment.',
    next_title: '📦 What\'s next...',
    step1: '1. We will send the course materials to your email within 1 business day after payment confirmation',
    step2: '2. If you don\'t receive it, please check your spam folder',
    step3: '3. If you have any questions, please contact us',
    home_btn: '🏠 Back to Home'
  }
}

function getLang() {
  const saved = localStorage.getItem('frank-dev-lang')
  if (saved && ['tw','jp','cn','ph'].includes(saved)) return saved
  const nav = (navigator.language || '').toLowerCase()
  if (nav.startsWith('ja')) return 'jp'
  if (nav.startsWith('zh')) {
    if (nav.includes('tw') || nav.includes('hant')) return 'tw'
    return 'cn'
  }
  if (nav.startsWith('fil') || nav.startsWith('tl')) return 'ph'
  return 'tw'
}

const lang = getLang()
const t = TEXTS[lang] || TEXTS.tw
document.getElementById('s-title').textContent = t.title
document.getElementById('s-sub').textContent = t.sub
document.getElementById('s-next-title').textContent = t.next_title
document.getElementById('s-step1').textContent = t.step1
document.getElementById('s-step2').textContent = t.step2
document.getElementById('s-step3').textContent = t.step3
document.getElementById('s-home-btn').textContent = t.home_btn
</script>
</body>
</html>
